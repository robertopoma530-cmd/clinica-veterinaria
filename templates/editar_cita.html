{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h2 class="mb-0"> Editar Cita</h2>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la Mascota *</label>
                        <input type="text" name="mascota" class="form-control" value="{{ cita.mascota }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Nombre del Propietario *</label>
                        <input type="text" name="propietario" class="form-control" value="{{ cita.propietario }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Especie</label>
                        <input type="text" name="especie" class="form-control" value="{{ cita.especie }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Fecha y Hora *</label>
                        <input type="text" name="fecha" class="form-control" value="{{ cita.fecha }}" required>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <button type="submit" class="btn btn-primary">Actualizar Cita</button>
                        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
